<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MY Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class='container'>
      <div class='row'>
        <h1 style='color:blue;text-align:center'>Employee Information System</h1>
        <table class='table table-bordered table-light table-hover'>
          <tr class='table-warning fs-5' style='text-align:center'>
            <th> Employee ID</th>
            <th> Employee Name</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Delete</th>
            <th>Edit</th>
          </tr>  
        {% for e in emp%}
        <tr>
          <td  class='table-info fs-5'>{{e.empid}}</td>
          <td>{{e.empname}}</td>
          <td>{{e.department}}</td>
          <td>{{e.salary}}</td>
          <td>
            <a href="{% url 'deleteemp' empid=e.empid %}" >             
            <button class='btn btn-danger'>Delete</button>
            </a>
          </td> 
          <td>
            <a href="{% url 'editemp' empid=e.empid %}" class='btn btn-success'>
              <button class='btn btn-success btn-sm'>Edit</button>

              </a> 
          </td>
        </tr>

        {% endfor %}  
        </table>

        <br><br>
        <a href="{% url 'empreg' %}" class='btn btn-success'> New Employee Registration</a>

      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
